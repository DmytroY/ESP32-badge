<!DOCTYPE HTML>
<html>
<head>
    <title>C3 Display Control</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" type="text/css" href="style.css">
</head>
<body>
    <h1>ESP32-C3 Display</h1>
    <input type="text" id="displayText" placeholder="Enter message...">
    <button class="btn on" onclick="sendText()">Update Display</button>

    <script>
    function sendText() {
        var text = document.getElementById("displayText").value;
        var xhttp = new XMLHttpRequest();
        xhttp.open("GET", "/msg?text=" + encodeURIComponent(text), true);
        xhttp.send();
    }
    </script>
</body>
</html>
